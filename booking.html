<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | Dove Nest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar glass scrolled">
        <a href="index.html" class="nav-brand">DOVE NEST</a>
    </nav>

    <section class="container" style="padding-top: 150px; max-width: 900px;">
        <div class="luxury-card glass reveal" style="padding: 4rem;">
            <div style="text-align: center; margin-bottom: 3rem;">
                <span class="subtitle">Reservation</span>
                <h2>Secure Your <span class="gold-text">Dates</span></h2>
            </div>

            <form id="bookingForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label class="subtitle" style="font-size: 0.6rem;">Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div>
                        <label class="subtitle" style="font-size: 0.6rem;">Phone Number</label>
                        <input type="tel" id="phone" required>
                    </div>
                </div>

                <label class="subtitle" style="font-size: 0.6rem;">Select Package</label>
                <select id="package">
                    <option value="Dayout">Dayout Package (₹400/pp)</option>
                    <option value="Private Dayout">Private Dayout (₹8,000)</option>
                    <option value="Private Nightout">Private Nightout (₹10,000)</option>
                    <option value="Wedding">Wedding Venue Package</option>
                    <option value="Corporate">Corporate Off-site</option>
                </select>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label class="subtitle" style="font-size: 0.6rem;">Event Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div>
                        <label class="subtitle" style="font-size: 0.6rem;">Guest Count</label>
                        <input type="number" id="guests" placeholder="Approx count">
                    </div>
                </div>

                <label class="subtitle" style="font-size: 0.6rem;">Dining Preference</label>
                <select id="food">
                    <option value="No Food">Venue Only (No Food)</option>
                    <option value="Veg Buffet">Veg Buffet Integration</option>
                    <option value="Non-Veg Buffet">Non-Veg Buffet Integration</option>
                    <option value="BBQ Setup">Live BBQ Setup</option>
                </select>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 20px; font-size: 1rem; margin-top: 20px;">Confirm & Send to WhatsApp</button>
            </form>
        </div>
    </section>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const pkg = document.getElementById('package').value;
            const date = document.getElementById('date').value;
            const guests = document.getElementById('guests').value;
            const food = document.getElementById('food').value;

            const message = `Hello Dove Nest! I'd like to book:\n\nName: ${name}\nPackage: ${pkg}\nDate: ${date}\nGuests: ${guests}\nDining: ${food}`;
            window.open(`https://wa.me/919822182917?text=${encodeURIComponent(message)}`, '_blank');
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
