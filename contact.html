<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dove Nest Goa</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-wrapper { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; margin-top: 50px; }
        .info-card { margin-bottom: 20px; padding: 30px; }
        .map-frame { width: 100%; height: 400px; border-radius: var(--radius-lg); border: 1px solid var(--glass-border); filter: grayscale(1) invert(1); opacity: 0.7; }
        input, textarea, select {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 15px; color: white; border-radius: var(--radius-sm); margin-bottom: 20px; font-family: var(--font-body);
        }
        input:focus { border-color: var(--gold); outline: none; }
    </style>
</head>
<body>
    <nav class="navbar glass scrolled">
        <a href="index.html" class="nav-brand">DOVE NEST</a>
        <button class="hamburger">☰</button>
    </nav>

    <section class="container" style="padding-top: 150px;">
        <div class="reveal">
            <span class="subtitle">Get In Touch</span>
            <h1>Let's Plan Your <span class="gold-text">Experience</span></h1>
        </div>

        <div class="contact-wrapper">
            <div class="reveal">
                <div class="luxury-card glass info-card">
                    <h4 class="gold-text">Location</h4>
                    <p>Bairro Band, St. Cruz, Goa 403005</p>
                </div>
                <div class="luxury-card glass info-card">
                    <h4 class="gold-text">Direct Line</h4>
                    <p>+91 98221 82917</p>
                </div>
                <a href="https://wa.me/919822182917" class="btn-primary" style="width: 100%; text-align: center;">Chat on WhatsApp</a>
            </div>

            <div class="luxury-card glass reveal">
                <form id="contactForm">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <textarea placeholder="Tell us about your event..." rows="5"></textarea>
                    <button type="submit" class="btn-primary">Send Inquiry</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
