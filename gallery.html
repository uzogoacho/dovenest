<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Dove Nest Luxury Venue</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .filter-btn.active, .filter-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--gold-glow);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 300px;
            gap: 20px;
            grid-auto-flow: dense;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-item.wide { grid-column: span 2; }
        .gallery-item.tall { grid-row: span 2; }
        
        .gallery-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: flex-end;
            padding: 20px;
            opacity: 0;
            transition: 0.5s;
        }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
    </style>
</head>
<body>
    <nav class="navbar glass scrolled">
        <a href="index.html" class="nav-brand">DOVE NEST</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="packages.html">Packages</a></li>
            <li><a href="gallery.html" class="gold-text">Gallery</a></li>
            <li><a href="availability.html">Availability</a></li>
            <li><a href="booking.html" class="btn-primary">Book Now</a></li>
        </ul>
        <button class="hamburger">☰</button>
    </nav>

    <section class="container" style="padding-top: 150px;">
        <div style="text-align: center; margin-bottom: 4rem;">
            <span class="subtitle">Visual Journey</span>
            <h1>Immersive <span class="gold-text">Moments</span></h1>
        </div>

        <div class="filter-container reveal">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Weddings</button>
            <button class="filter-btn">Poolside</button>
            <button class="filter-btn">Suites</button>
            <button class="filter-btn">Catering</button>
        </div>

        <div class="gallery-grid reveal">
            <div class="gallery-item tall">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=800" alt="Wedding Decor">
                <div class="gallery-overlay"><span>Royal Wedding Setup</span></div>
            </div>
            <div class="gallery-item wide">
                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1200" alt="Pool Night">
                <div class="gallery-overlay"><span>Poolside Ambience</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1582719478250-c89cae4df85b?auto=format&fit=crop&w=800" alt="Suites">
                <div class="gallery-overlay"><span>Luxury Suite</span></div>
            </div>
            <div class="gallery-item tall">
                <img src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=800" alt="Dining">
                <div class="gallery-overlay"><span>Fine Dining Experience</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?auto=format&fit=crop&w=800" alt="Night Party">
                <div class="gallery-overlay"><span>Night Celebrations</span></div>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
