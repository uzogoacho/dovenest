<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gallery | Dove Nest Goa</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-auto-rows: 250px;
            gap: 25px;
            padding: 150px 0;
        }
        .gallery-card {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }
        .gallery-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1.5s var(--ease);
            filter: saturate(0.8) brightness(0.8);
        }
        .gallery-card:hover img { transform: scale(1.1) saturate(1.2) brightness(1); }
        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="bg-engine"><div class="glow-orb"></div></div>

    <nav style="position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 50px; display: flex; justify-content: space-between;">
        <a href="index.html" style="color: var(--mint-glow); text-decoration: none; font-weight: 800; letter-spacing: 2px;">BACK</a>
    </nav>

    <main class="container" style="padding: 0 5vw;">
        <div class="reveal" style="text-align: center; padding-top: 100px;">
            <h1 class="gold-gradient" style="font-size: 4rem;">Visual Poetry</h1>
        </div>

        <div class="masonry-grid">
            <div class="gallery-card wide reveal">
                <img src="https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7?auto=format&fit=crop&w=1200" alt="Private Pool">
            </div>
            <div class="gallery-card tall reveal">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=800" alt="Garden Event">
            </div>
            <div class="gallery-card reveal">
                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=800" alt="Luxury Suite">
            </div>
            <div class="gallery-card reveal">
                <img src="https://images.unsplash.com/photo-1555244162-803834f70033?auto=format&fit=crop&w=800" alt="Dove Caterers">
            </div>
        </div>
    </main>

    <script src="js/metamorphosis.js"></script>
</body>
</html>
